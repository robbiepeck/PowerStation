# Lint, test and build on supported platforms. Platform packages are unsigned
# CI verification artifacts, not consumer releases. Signed stable releases are
# prepared and published manually after their platform trust checks are complete.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-policy:
    name: Release policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Require release tags to come from main
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "::error::Release tags must point to a commit on main."
            exit 1
          }

  check:
    name: Lint, test, build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run lint
      - run: npm test
      - run: npm run build

  package-windows:
    name: Package Windows installer
    needs: [check, release-policy]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build unsigned CI verification packages
        run: npx electron-builder --win --x64 --publish never
      - name: Install and launch the Windows package
        shell: pwsh
        run: |
          $installer = Get-ChildItem release/*Windows-Setup-x64.exe | Select-Object -First 1
          if (-not $installer) { throw 'Windows installer was not created.' }
          $installDir = Join-Path $env:RUNNER_TEMP 'PowerStationInstalled'
          $process = Start-Process -FilePath $installer.FullName -ArgumentList '/S', "/D=$installDir" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Windows installer exited with code $($process.ExitCode)." }
          npm run test:packaged -- "$installDir\PowerStation.exe"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PowerStation-windows-x64-unsigned-ci
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  package-linux:
    name: Package Linux app
    needs: [check, release-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build unsigned CI verification packages
        run: npx electron-builder --linux --x64 --publish never
      - name: Install and launch the Debian package
        timeout-minutes: 5
        run: |
          deb=$(find "$PWD/release" -maxdepth 1 -name '*.deb' -print -quit)
          test -n "$deb"
          sudo apt-get install -y "$deb"
          xvfb-run -a npm run test:packaged -- /usr/bin/powerstation
      - name: Launch the AppImage
        timeout-minutes: 5
        run: |
          appimage=$(find release -maxdepth 1 -name '*.AppImage' -print -quit)
          test -n "$appimage"
          chmod +x "$appimage"
          APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run -a npm run test:packaged -- "$appimage"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PowerStation-linux-x64-unsigned-ci
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml
          if-no-files-found: error

  package-macos:
    name: Package macOS app
    needs: [check, release-policy]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test schedules UI in an isolated profile
        run: npm run test:schedules-ui
      - name: Test the documented source installer
        env:
          POWERSTATION_INSTALL_SKIP_DEPENDENCIES: '1'
          POWERSTATION_INSTALL_SKIP_LAUNCH: '1'
          POWERSTATION_INSTALL_DIR: ${{ runner.temp }}/PowerStation Applications
        run: npm run install:mac
      - name: Launch the locally installed macOS app
        timeout-minutes: 5
        run: npm run test:packaged -- "$RUNNER_TEMP/PowerStation Applications/PowerStation.app/Contents/MacOS/PowerStation"
      - name: Verify local signature
        run: |
          codesign --verify --deep --strict --verbose=2 release/mac-arm64/PowerStation.app
      - name: Build unsigned CI verification packages
        run: npx electron-builder --mac --arm64 --publish never -c.mac.identity=- -c.mac.hardenedRuntime=false -c.mac.notarize=false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PowerStation-macos-arm64-unsigned-ci
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
