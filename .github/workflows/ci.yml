# Lint, test and build on both supported platforms, and package the Windows
# installer on a real Windows runner (native llama.cpp binaries are
# platform-specific, so cross-building from macOS would ship the wrong ones).
# Pushing a v* tag publishes the installers to that tag's GitHub Release.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# electron-builder publishes installers to the tag's GitHub Release, which
# needs write access — the default workflow token is read-only.
permissions:
  contents: write

jobs:
  check:
    name: Lint, test, build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  package-windows:
    name: Package Windows installer
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build installer
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --win --x64 --publish never
      - name: Build installer and publish to the tag's release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: PowerStation-windows-x64
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  package-macos:
    name: Package macOS app
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --mac --arm64 --publish never
      - name: Build app and publish to the tag's release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: PowerStation-macos-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
