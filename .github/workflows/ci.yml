# Lint, test and build on supported platforms, and package installers on real
# target-platform runners. Native llama.cpp binaries are platform-specific, so
# cross-building from another OS would ship the wrong ones.
# Pushing a v* tag publishes the installers to that tag's GitHub Release.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# electron-builder publishes installers to the tag's GitHub Release, which
# needs write access — the default workflow token is read-only.
permissions:
  contents: read

jobs:
  release-policy:
    name: Release policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Require release tags to come from main
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "::error::Release tags must point to a commit on main."
            exit 1
          }

  check:
    name: Lint, test, build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run lint
      - run: npm test
      - run: npm run build

  package-windows:
    name: Package Windows installer
    needs: [check, release-policy]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build installer
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --win --x64 --publish never
      - name: Build installer and publish to the tag's release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --win --x64 --publish always -c.forceCodeSigning=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: PowerStation-windows-x64
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  package-linux:
    name: Package Linux app
    needs: [check, release-policy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build AppImage and deb
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --linux --x64 --publish never
      - name: Build AppImage and deb, then publish to the tag's release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --linux --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: PowerStation-linux-x64
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml
          if-no-files-found: error

  package-macos:
    name: Package macOS app
    needs: [check, release-policy]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --mac --arm64 --publish never -c.mac.identity=- -c.mac.hardenedRuntime=false -c.mac.notarize=false
      - name: Validate macOS release credentials
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          test -n "$CSC_LINK" || { echo "::error::Missing MACOS_CSC_LINK"; exit 1; }
          test -n "$CSC_KEY_PASSWORD" || { echo "::error::Missing MACOS_CSC_KEY_PASSWORD"; exit 1; }
          test -n "$APPLE_API_KEY_BASE64" || { echo "::error::Missing APPLE_API_KEY_BASE64"; exit 1; }
          test -n "$APPLE_API_KEY_ID" || { echo "::error::Missing APPLE_API_KEY_ID"; exit 1; }
          test -n "$APPLE_API_ISSUER" || { echo "::error::Missing APPLE_API_ISSUER"; exit 1; }
      - name: Prepare App Store Connect API key
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
      - name: Build app and publish to the tag's release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --mac --arm64 --publish always -c.forceCodeSigning=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Verify Developer ID signature and notarization
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          codesign --verify --deep --strict --verbose=2 release/mac-arm64/PowerStation.app
          spctl --assess --type execute --verbose=4 release/mac-arm64/PowerStation.app
          xcrun stapler validate release/mac-arm64/PowerStation.app
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: PowerStation-macos-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
