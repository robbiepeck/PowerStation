# Lint, test and build on supported platforms. Platform packages are unsigned
# CI verification artifacts, not consumer releases. A v* tag publishes only
# GitHub's source archives after every check passes.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-policy:
    name: Release policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Require release tags to come from main
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "::error::Release tags must point to a commit on main."
            exit 1
          }

  check:
    name: Lint, test, build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run lint
      - run: npm test
      - run: npm run build

  package-windows:
    name: Package Windows installer
    needs: [check, release-policy]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build unsigned CI verification packages
        run: npx electron-builder --win --x64 --publish never
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PowerStation-windows-x64-unsigned-ci
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  package-linux:
    name: Package Linux app
    needs: [check, release-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build unsigned CI verification packages
        run: npx electron-builder --linux --x64 --publish never
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PowerStation-linux-x64-unsigned-ci
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml
          if-no-files-found: error

  package-macos:
    name: Package macOS app
    needs: [check, release-policy]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test schedules UI in an isolated profile
        run: npm run test:schedules-ui
      - name: Test the documented source installer
        env:
          POWERSTATION_INSTALL_SKIP_DEPENDENCIES: '1'
          POWERSTATION_INSTALL_SKIP_LAUNCH: '1'
          POWERSTATION_INSTALL_DIR: ${{ runner.temp }}/PowerStation Applications
        run: npm run install:mac
      - name: Verify local signature
        run: |
          codesign --verify --deep --strict --verbose=2 release/mac-arm64/PowerStation.app
      - name: Build unsigned CI verification packages
        run: npx electron-builder --mac --arm64 --publish never -c.mac.identity=- -c.mac.hardenedRuntime=false -c.mac.notarize=false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PowerStation-macos-arm64-unsigned-ci
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  publish-source-release:
    name: Publish source-only release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [release-policy, check, package-windows, package-linux, package-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create source-only GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists."
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --title "PowerStation $GITHUB_REF_NAME — source release"
